<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GP Appraisal Learning Log</title>
  <style>
/* Reset & base */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #f0f4f8;
  color: #1a2332;
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 1rem;
}

/* Header */
header {
  background: #1b4f72;
  color: #fff;
  padding: 1.5rem 2rem;
  border-radius: 8px 8px 0 0;
  margin-bottom: 0;
}

header h1 {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 1rem;
}

nav {
  display: flex;
  gap: 0.5rem;
}

.nav-btn {
  background: rgba(255, 255, 255, 0.15);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.3);
  padding: 0.5rem 1.25rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: background 0.2s;
}

.nav-btn:hover {
  background: rgba(255, 255, 255, 0.25);
}

.nav-btn.active {
  background: #fff;
  color: #1b4f72;
  font-weight: 600;
}

.badge {
  background: #e74c3c;
  color: #fff;
  font-size: 0.75rem;
  padding: 0.1rem 0.5rem;
  border-radius: 10px;
  margin-left: 0.25rem;
}

.nav-btn.active .badge {
  background: #1b4f72;
  color: #fff;
}

/* Sections */
section {
  background: #fff;
  padding: 2rem;
  border-radius: 0 0 8px 8px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
}

.hidden {
  display: none !important;
}

/* Form layout */
.form-row {
  display: flex;
  gap: 1.5rem;
}

.form-row.two-col > .form-group {
  flex: 1;
}

.form-group {
  margin-bottom: 1.5rem;
}

label, legend {
  display: block;
  font-weight: 600;
  margin-bottom: 0.4rem;
  font-size: 0.95rem;
  color: #1a2332;
}

fieldset {
  border: 1px solid #d5dce6;
  border-radius: 6px;
  padding: 1rem 1.25rem;
}

legend {
  padding: 0 0.4rem;
  font-size: 0.95rem;
}

.required {
  color: #e74c3c;
}

/* Inputs */
input[type="text"],
input[type="date"],
input[type="number"],
textarea,
#search-input {
  width: 100%;
  padding: 0.6rem 0.75rem;
  border: 1px solid #ced4da;
  border-radius: 6px;
  font-size: 0.95rem;
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus,
textarea:focus,
#search-input:focus {
  outline: none;
  border-color: #1b4f72;
  box-shadow: 0 0 0 3px rgba(27, 79, 114, 0.15);
}

textarea {
  resize: vertical;
  min-height: 120px;
}

/* Radio & checkbox grids */
.radio-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
}

.checkbox-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
}

.checkbox-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.radio-label,
.checkbox-label {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  font-weight: 400;
  font-size: 0.9rem;
  cursor: pointer;
  padding: 0.4rem 0.5rem;
  border-radius: 4px;
  transition: background 0.15s;
}

.radio-label:hover,
.checkbox-label:hover {
  background: #f0f4f8;
}

.radio-label input,
.checkbox-label input {
  margin-top: 0.2rem;
  flex-shrink: 0;
  accent-color: #1b4f72;
}

/* Buttons */
.form-actions {
  display: flex;
  gap: 1rem;
  margin-top: 0.5rem;
}

.btn-primary {
  background: #1b4f72;
  color: #fff;
  border: none;
  padding: 0.75rem 2rem;
  border-radius: 6px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-primary:hover {
  background: #154360;
}

.btn-secondary {
  background: #fff;
  color: #1b4f72;
  border: 1px solid #1b4f72;
  padding: 0.75rem 1.5rem;
  border-radius: 6px;
  font-size: 0.95rem;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-secondary:hover {
  background: #eaf2f8;
}

.btn-danger {
  background: #fff;
  color: #c0392b;
  border: 1px solid #c0392b;
  padding: 0.4rem 0.9rem;
  border-radius: 6px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-danger:hover {
  background: #fdedec;
}

.btn-edit {
  background: #fff;
  color: #1b4f72;
  border: 1px solid #1b4f72;
  padding: 0.4rem 0.9rem;
  border-radius: 6px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-edit:hover {
  background: #eaf2f8;
}

/* Records view */
.records-toolbar {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

#search-input {
  flex: 1;
}

/* Record cards */
.record-card {
  border: 1px solid #d5dce6;
  border-radius: 8px;
  padding: 1.25rem;
  margin-bottom: 1rem;
  transition: box-shadow 0.2s;
}

.record-card:hover {
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

.record-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.75rem;
}

.record-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: #1b4f72;
}

.record-meta {
  display: flex;
  gap: 1.5rem;
  font-size: 0.85rem;
  color: #5d6d7e;
  margin-bottom: 0.5rem;
}

.record-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-bottom: 0.75rem;
}

.tag {
  background: #eaf2f8;
  color: #1b4f72;
  font-size: 0.78rem;
  padding: 0.2rem 0.6rem;
  border-radius: 12px;
}

.tag.domain {
  background: #d5f5e3;
  color: #1e8449;
}

.record-description {
  font-size: 0.9rem;
  color: #34495e;
  white-space: pre-wrap;
  margin-bottom: 0.75rem;
}

.record-actions {
  display: flex;
  gap: 0.5rem;
  justify-content: flex-end;
}

#no-records {
  text-align: center;
  color: #7f8c8d;
  padding: 3rem 1rem;
  font-size: 1rem;
}

/* Validation */
.invalid {
  border-color: #e74c3c !important;
}

fieldset.invalid {
  border-color: #e74c3c;
}

.error-msg {
  color: #e74c3c;
  font-size: 0.8rem;
  margin-top: 0.25rem;
}

/* Toast notification */
.toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: #1b4f72;
  color: #fff;
  padding: 0.75rem 1.5rem;
  border-radius: 8px;
  font-size: 0.95rem;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
  opacity: 0;
  transform: translateY(1rem);
  transition: opacity 0.3s, transform 0.3s;
  z-index: 1000;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

/* Responsive */
@media (max-width: 600px) {
  .container {
    padding: 0.5rem;
  }

  header {
    padding: 1rem;
  }

  header h1 {
    font-size: 1.2rem;
  }

  section {
    padding: 1rem;
  }

  .form-row {
    flex-direction: column;
    gap: 0;
  }

  .radio-grid,
  .checkbox-grid {
    grid-template-columns: 1fr;
  }

  .form-actions {
    flex-direction: column;
  }

  .records-toolbar {
    flex-direction: column;
  }

  .record-header {
    flex-direction: column;
    gap: 0.5rem;
  }

  .record-meta {
    flex-direction: column;
    gap: 0.25rem;
  }
}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>GP Appraisal Learning Log</h1>
      <nav>
        <button id="btn-new" class="nav-btn active">New Entry</button>
        <button id="btn-records" class="nav-btn">Saved Records <span id="record-count" class="badge">0</span></button>
      </nav>
    </header>

    <!-- FORM VIEW -->
    <section id="form-view">
      <form id="learning-log-form" novalidate>

        <!-- Row 1: Date + Length -->
        <div class="form-row two-col">
          <div class="form-group">
            <label for="activity-date">Date of Activity <span class="required">*</span></label>
            <input type="date" id="activity-date" name="activityDate" required>
          </div>
          <div class="form-group">
            <label for="session-length">Length of Session (in hours) <span class="required">*</span></label>
            <input type="number" id="session-length" name="sessionLength" min="0" step="0.25" placeholder="e.g. 1.5" required>
          </div>
        </div>

        <!-- Title -->
        <div class="form-group">
          <label for="session-title">Title of Session <span class="required">*</span></label>
          <input type="text" id="session-title" name="sessionTitle" placeholder="Enter session title" required>
        </div>

        <!-- Session Type (radio) -->
        <fieldset class="form-group">
          <legend>This session was: <span class="required">*</span></legend>
          <div class="radio-grid">
            <label class="radio-label">
              <input type="radio" name="sessionType" value="Podcast"> Podcast
            </label>
            <label class="radio-label">
              <input type="radio" name="sessionType" value="Online talk"> Online talk
            </label>
            <label class="radio-label">
              <input type="radio" name="sessionType" value="Face-to-face meeting"> Face-to-face meeting
            </label>
            <label class="radio-label">
              <input type="radio" name="sessionType" value="Practice-based discussion"> Practice-based discussion
            </label>
            <label class="radio-label">
              <input type="radio" name="sessionType" value="Journal article or other reading material"> Journal article or other reading material
            </label>
            <label class="radio-label">
              <input type="radio" name="sessionType" value="Other"> Other
            </label>
          </div>
        </fieldset>

        <!-- Domains of Good Medical Practice (checkboxes) -->
        <fieldset class="form-group">
          <legend>Domains of Good Medical Practice</legend>
          <div class="checkbox-grid">
            <label class="checkbox-label">
              <input type="checkbox" name="domains" value="Knowledge, skills and development">
              Knowledge, skills and development
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="domains" value="Patients partnership and communication">
              Patients partnership and communication
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="domains" value="Colleagues, culture and safety">
              Colleagues, culture and safety
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="domains" value="Trust and professionalism">
              Trust and professionalism
            </label>
          </div>
        </fieldset>

        <!-- Sub-domains of Good Medical Practice (checkboxes) -->
        <fieldset class="form-group">
          <legend>Sub-domain of Good Medical Practice</legend>
          <div class="checkbox-list">
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Being competent and providing good clinical care">
              Being competent and providing good clinical care
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Maintaining, developing and improving your performance">
              Maintaining, developing and improving your performance
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Managing resources effectively and sustainably">
              Managing resources effectively and sustainably
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Helping in emergencies">
              Helping in emergencies
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Treating patients fairly with kindness and courtesy and respecting their rights">
              Treating patients fairly with kindness and courtesy and respecting their rights
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Supporting patients holistically to make decisions about treatment and care. Sharing information with patients and those close to them.">
              Supporting patients holistically to make decisions about treatment and care. Sharing information with patients and those close to them.
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Safeguarding children and adults who are at risk of harm">
              Safeguarding children and adults who are at risk of harm
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Treating colleagues with kindness, courtesy and respect">
              Treating colleagues with kindness, courtesy and respect
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Contributing to a positive and inclusive environment, demonstrating leadership and delegating appropriately">
              Contributing to a positive and inclusive environment, demonstrating leadership and delegating appropriately
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Contributing to continuity of care">
              Contributing to continuity of care
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Delegating safely and appropriately, recording your work clearly accurately and legibly">
              Delegating safely and appropriately, recording your work clearly accurately and legibly
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Acting with honesty and integrity">
              Acting with honesty and integrity
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Maintaining professional boundaries and communicating as a professional">
              Maintaining professional boundaries and communicating as a professional
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="subDomains" value="Keeping patients safe, responding to safety risks, managing risks posed by your health">
              Keeping patients safe, responding to safety risks, managing risks posed by your health
            </label>
          </div>
        </fieldset>

        <!-- Learning description -->
        <div class="form-group">
          <label for="learning-description">Describe learning from the session and how you will apply what you have learned <span class="required">*</span></label>
          <textarea id="learning-description" name="learningDescription" rows="6" placeholder="Describe what you learned and how you plan to apply it..." required></textarea>
        </div>

        <!-- Form actions -->
        <div class="form-actions">
          <button type="submit" class="btn-primary" id="btn-save">Save Entry</button>
          <button type="button" class="btn-secondary" id="btn-clear">Clear Form</button>
        </div>
      </form>
    </section>

    <!-- RECORDS VIEW -->
    <section id="records-view" class="hidden">
      <div class="records-toolbar">
        <input type="text" id="search-input" placeholder="Search records...">
        <button id="btn-export" class="btn-secondary">Export CSV</button>
      </div>
      <div id="records-list"></div>
      <p id="no-records" class="hidden">No records found. Start by adding a new entry.</p>
    </section>
  </div>

  <script>
(function () {
  "use strict";

  const STORAGE_KEY = "gp-learning-log-records";

  // DOM elements
  const form = document.getElementById("learning-log-form");
  const formView = document.getElementById("form-view");
  const recordsView = document.getElementById("records-view");
  const btnNew = document.getElementById("btn-new");
  const btnRecords = document.getElementById("btn-records");
  const btnClear = document.getElementById("btn-clear");
  const btnExport = document.getElementById("btn-export");
  const searchInput = document.getElementById("search-input");
  const recordsList = document.getElementById("records-list");
  const noRecords = document.getElementById("no-records");
  const recordCount = document.getElementById("record-count");
  const btnSave = document.getElementById("btn-save");

  let editingId = null;

  // --- Storage helpers ---
  function loadRecords() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  function saveRecords(records) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    updateRecordCount();
  }

  function updateRecordCount() {
    const count = loadRecords().length;
    recordCount.textContent = count;
  }

  // --- Navigation ---
  function showForm() {
    formView.classList.remove("hidden");
    recordsView.classList.add("hidden");
    btnNew.classList.add("active");
    btnRecords.classList.remove("active");
  }

  function showRecords() {
    formView.classList.add("hidden");
    recordsView.classList.remove("hidden");
    btnNew.classList.remove("active");
    btnRecords.classList.add("active");
    renderRecords();
  }

  btnNew.addEventListener("click", showForm);
  btnRecords.addEventListener("click", showRecords);

  // --- Toast ---
  function showToast(message) {
    let toast = document.querySelector(".toast");
    if (!toast) {
      toast = document.createElement("div");
      toast.className = "toast";
      document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(function () {
      toast.classList.remove("show");
    }, 2500);
  }

  // --- Validation ---
  function clearErrors() {
    form.querySelectorAll(".invalid").forEach(function (el) {
      el.classList.remove("invalid");
    });
    form.querySelectorAll(".error-msg").forEach(function (el) {
      el.remove();
    });
  }

  function showError(element, message) {
    element.classList.add("invalid");
    var msg = document.createElement("div");
    msg.className = "error-msg";
    msg.textContent = message;
    element.parentNode.appendChild(msg);
  }

  function validateForm() {
    clearErrors();
    var valid = true;

    var date = document.getElementById("activity-date");
    if (!date.value) {
      showError(date, "Please select a date.");
      valid = false;
    }

    var length = document.getElementById("session-length");
    if (!length.value || parseFloat(length.value) <= 0) {
      showError(length, "Please enter session length.");
      valid = false;
    }

    var title = document.getElementById("session-title");
    if (!title.value.trim()) {
      showError(title, "Please enter a session title.");
      valid = false;
    }

    var sessionType = form.querySelector('input[name="sessionType"]:checked');
    if (!sessionType) {
      var fieldset = form.querySelector('input[name="sessionType"]').closest("fieldset");
      showError(fieldset, "Please select a session type.");
      valid = false;
    }

    var description = document.getElementById("learning-description");
    if (!description.value.trim()) {
      showError(description, "Please describe your learning.");
      valid = false;
    }

    return valid;
  }

  // --- Collect form data ---
  function collectFormData() {
    var checkedDomains = [];
    form.querySelectorAll('input[name="domains"]:checked').forEach(function (cb) {
      checkedDomains.push(cb.value);
    });

    var checkedSubDomains = [];
    form.querySelectorAll('input[name="subDomains"]:checked').forEach(function (cb) {
      checkedSubDomains.push(cb.value);
    });

    var sessionTypeEl = form.querySelector('input[name="sessionType"]:checked');

    return {
      id: editingId || Date.now().toString(36) + Math.random().toString(36).slice(2, 8),
      activityDate: document.getElementById("activity-date").value,
      sessionLength: parseFloat(document.getElementById("session-length").value),
      sessionTitle: document.getElementById("session-title").value.trim(),
      sessionType: sessionTypeEl ? sessionTypeEl.value : "",
      domains: checkedDomains,
      subDomains: checkedSubDomains,
      learningDescription: document.getElementById("learning-description").value.trim(),
      createdAt: editingId ? undefined : new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
  }

  // --- Populate form for editing ---
  function populateForm(record) {
    document.getElementById("activity-date").value = record.activityDate;
    document.getElementById("session-length").value = record.sessionLength;
    document.getElementById("session-title").value = record.sessionTitle;

    // Session type
    var radio = form.querySelector('input[name="sessionType"][value="' + CSS.escape(record.sessionType) + '"]');
    if (radio) radio.checked = true;

    // Domains
    form.querySelectorAll('input[name="domains"]').forEach(function (cb) {
      cb.checked = record.domains.indexOf(cb.value) !== -1;
    });

    // Sub-domains
    form.querySelectorAll('input[name="subDomains"]').forEach(function (cb) {
      cb.checked = record.subDomains.indexOf(cb.value) !== -1;
    });

    document.getElementById("learning-description").value = record.learningDescription;
  }

  // --- Form submit ---
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    if (!validateForm()) return;

    var data = collectFormData();
    var records = loadRecords();

    if (editingId) {
      var idx = records.findIndex(function (r) { return r.id === editingId; });
      if (idx !== -1) {
        data.createdAt = records[idx].createdAt;
        records[idx] = data;
      }
      editingId = null;
      btnSave.textContent = "Save Entry";
      showToast("Entry updated successfully");
    } else {
      records.unshift(data);
      showToast("Entry saved successfully");
    }

    saveRecords(records);
    form.reset();
    clearErrors();
    showRecords();
  });

  // --- Clear form ---
  btnClear.addEventListener("click", function () {
    form.reset();
    clearErrors();
    editingId = null;
    btnSave.textContent = "Save Entry";
  });

  // --- Render records ---
  function formatDate(dateStr) {
    if (!dateStr) return "";
    var parts = dateStr.split("-");
    return parts[2] + "/" + parts[1] + "/" + parts[0];
  }

  function renderRecords(filter) {
    var records = loadRecords();
    var query = (filter || searchInput.value).toLowerCase().trim();

    if (query) {
      records = records.filter(function (r) {
        return (
          r.sessionTitle.toLowerCase().indexOf(query) !== -1 ||
          r.sessionType.toLowerCase().indexOf(query) !== -1 ||
          r.learningDescription.toLowerCase().indexOf(query) !== -1 ||
          r.domains.join(" ").toLowerCase().indexOf(query) !== -1 ||
          r.subDomains.join(" ").toLowerCase().indexOf(query) !== -1
        );
      });
    }

    recordsList.innerHTML = "";

    if (records.length === 0) {
      noRecords.classList.remove("hidden");
      return;
    }

    noRecords.classList.add("hidden");

    records.forEach(function (record) {
      var card = document.createElement("div");
      card.className = "record-card";

      var domainTags = record.domains
        .map(function (d) { return '<span class="tag domain">' + escapeHtml(d) + "</span>"; })
        .join("");

      var subDomainTags = record.subDomains
        .map(function (d) { return '<span class="tag">' + escapeHtml(d) + "</span>"; })
        .join("");

      var descriptionPreview = record.learningDescription.length > 200
        ? record.learningDescription.substring(0, 200) + "..."
        : record.learningDescription;

      card.innerHTML =
        '<div class="record-header">' +
        '  <div class="record-title">' + escapeHtml(record.sessionTitle) + "</div>" +
        "</div>" +
        '<div class="record-meta">' +
        "  <span>Date: " + formatDate(record.activityDate) + "</span>" +
        "  <span>Duration: " + record.sessionLength + " hrs</span>" +
        "  <span>Type: " + escapeHtml(record.sessionType) + "</span>" +
        "</div>" +
        '<div class="record-tags">' + domainTags + subDomainTags + "</div>" +
        '<div class="record-description">' + escapeHtml(descriptionPreview) + "</div>" +
        '<div class="record-actions">' +
        '  <button class="btn-edit" data-id="' + record.id + '">Edit</button>' +
        '  <button class="btn-danger" data-id="' + record.id + '">Delete</button>' +
        "</div>";

      recordsList.appendChild(card);
    });

    // Event delegation for edit/delete
    recordsList.querySelectorAll(".btn-edit").forEach(function (btn) {
      btn.addEventListener("click", function () {
        editRecord(btn.dataset.id);
      });
    });

    recordsList.querySelectorAll(".btn-danger").forEach(function (btn) {
      btn.addEventListener("click", function () {
        deleteRecord(btn.dataset.id);
      });
    });
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // --- Edit ---
  function editRecord(id) {
    var records = loadRecords();
    var record = records.find(function (r) { return r.id === id; });
    if (!record) return;

    editingId = id;
    populateForm(record);
    btnSave.textContent = "Update Entry";
    showForm();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // --- Delete ---
  function deleteRecord(id) {
    if (!confirm("Are you sure you want to delete this entry?")) return;

    var records = loadRecords().filter(function (r) { return r.id !== id; });
    saveRecords(records);
    renderRecords();
    showToast("Entry deleted");
  }

  // --- Search ---
  searchInput.addEventListener("input", function () {
    renderRecords();
  });

  // --- Export CSV ---
  btnExport.addEventListener("click", function () {
    var records = loadRecords();
    if (records.length === 0) {
      showToast("No records to export");
      return;
    }

    var headers = [
      "Date of Activity",
      "Length (hrs)",
      "Title",
      "Session Type",
      "Domains",
      "Sub-Domains",
      "Learning Description"
    ];

    var rows = records.map(function (r) {
      return [
        formatDate(r.activityDate),
        r.sessionLength,
        csvEscape(r.sessionTitle),
        csvEscape(r.sessionType),
        csvEscape(r.domains.join("; ")),
        csvEscape(r.subDomains.join("; ")),
        csvEscape(r.learningDescription)
      ].join(",");
    });

    var csv = headers.join(",") + "\n" + rows.join("\n");
    var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "gp-learning-log-" + new Date().toISOString().slice(0, 10) + ".csv";
    a.click();
    URL.revokeObjectURL(url);
    showToast("CSV exported");
  });

  function csvEscape(str) {
    if (!str) return '""';
    if (str.indexOf(",") !== -1 || str.indexOf('"') !== -1 || str.indexOf("\n") !== -1) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  }

  // --- Init ---
  updateRecordCount();
})();
  </script>
</body>
</html>
